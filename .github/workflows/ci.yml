name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Backend — FastAPI / Python
  # ──────────────────────────────────────────────
  backend-lint:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

  backend-test:
    name: "Backend · Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

  # ──────────────────────────────────────────────
  # Frontend — Vite + React + TypeScript
  # ──────────────────────────────────────────────
  frontend-lint:
    name: "Frontend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

  frontend-build:
    name: "Frontend · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript + Vite build
        run: bun run build
