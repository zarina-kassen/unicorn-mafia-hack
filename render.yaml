services:
  # ── Backend: FastAPI + Pydantic AI ──
  - type: web
    name: frame-mog-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PYDANTIC_AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GENERATED_IMAGE_DIR
        value: /data/generated
      - key: AGENT_MODEL
        value: gateway/openai:gpt-5.3
    disk:
      name: generated-images
      mountPath: /data/generated
      sizeGB: 1

  # ── Frontend: Vite + React static site ──
  - type: web
    name: frame-mog-web
    runtime: static
    rootDir: ./frontend
    buildCommand: bun install --frozen-lockfile && bun run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
