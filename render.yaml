services:
  # ── Backend: FastAPI + Pydantic AI + PostgreSQL ──
  - type: web
    name: frame-mog-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MUBIT_API_KEY
        sync: false
      - key: AGENT_MODEL
        value: meta-llama/llama-3.3-70b-instruct
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: frame-mog-db
          property: connectionString
      - key: FAST_IMAGE_MODEL
        value: black-forest-labs/flux.2-klein-4b
      - key: HQ_IMAGE_MODEL
        value: black-forest-labs/flux.2-pro
      - key: POSE_GUIDE_MODEL
        value: openai/gpt-4o-mini
      - key: POSE_GUIDE_MAX_TOKENS
        value: "2048"
      - key: AGENT_MAX_TOKENS
        value: "8192"

  # ── PostgreSQL Database ──
  - type: pserv
    name: frame-mog-db
    plan: starter
    databaseName: frame_mog
    maxconnections: 20

  # ── Frontend: Vite + React static site ──
  - type: web
    name: frame-mog-web
    runtime: static
    rootDir: ./frontend
    buildCommand: bun install --frozen-lockfile && bun run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
