services:
  # ── Backend: FastAPI + Pydantic AI ──
  - type: web
    name: frame-mog-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PYDANTIC_AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AGENT_MODEL
        value: gateway/openai:gpt-5.3
      - key: S3_ENDPOINT_URL
        sync: false # e.g. https://frame-mog-storage.onrender.com:9000
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: S3_BUCKET
        value: generated-images
      - key: S3_PUBLIC_URL
        sync: false # Public URL prefix for serving images

  # ── Frontend: Vite + React static site ──
  - type: web
    name: frame-mog-web
    runtime: static
    rootDir: ./frontend
    buildCommand: bun install --frozen-lockfile && bun run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY

  # ── Object Storage: MinIO S3-compatible ──
  - type: web
    name: frame-mog-storage
    runtime: docker
    plan: starter
    dockerfilePath: ./storage/Dockerfile
    dockerContext: ./storage
    envVars:
      - key: MINIO_ROOT_USER
        generateValue: true
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
      - key: MINIO_BUCKET
        value: generated-images
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10
